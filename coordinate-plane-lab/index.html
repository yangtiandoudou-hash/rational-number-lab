<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>平面直角坐标系探索实验室</title>
  <style>
    :root {
      --blue: #1268f3;
      --blue-dark: #0a4ed6;
      --green: #18aa49;
      --orange: #ff9f1a;
      --red: #e14b4b;
      --ink: #071431;
      --muted: #5f708b;
      --line: #d8e6f8;
      --panel: rgba(255,255,255,.9);
      --shadow: 0 22px 60px rgba(13,78,180,.12);
      --radius: 28px;
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 8% 12%, rgba(18,104,243,.14), transparent 30%),
        radial-gradient(circle at 88% 14%, rgba(24,170,73,.12), transparent 25%),
        radial-gradient(circle at 84% 88%, rgba(255,159,26,.13), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #edf6ff 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(18,104,243,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18,104,243,.05) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
    }

    .app {
      width: min(1540px, calc(100vw - 44px));
      margin: 0 auto;
      padding: 30px 0 38px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 26px;
      margin-bottom: 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .lab-icon {
      width: 74px;
      height: 74px;
      border: 5px solid var(--blue);
      border-radius: 24px;
      background:
        linear-gradient(var(--blue), var(--blue)) 50% 12px / 5px 50px no-repeat,
        linear-gradient(90deg, var(--blue), var(--blue)) 12px 50% / 50px 5px no-repeat,
        linear-gradient(135deg, #fff 0 44%, #dff0ff 45% 100%);
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.75), 0 14px 28px rgba(18,104,243,.18);
      position: relative;
    }

    .lab-icon::before {
      content: "(x,y)";
      position: absolute;
      left: 13px;
      bottom: 9px;
      color: var(--green);
      font-size: 16px;
      font-weight: 950;
    }

    h1 {
      font-size: clamp(34px, 4.6vw, 64px);
      line-height: 1;
      margin: 0;
      font-weight: 950;
      letter-spacing: .03em;
    }

    .progress-wrap {
      min-width: 370px;
      flex: 0 1 540px;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 16px;
      color: #31415e;
      font-size: 20px;
      font-weight: 900;
    }

    .progress {
      height: 20px;
      border-radius: 999px;
      background: #dfe7f5;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(36,63,111,.12);
    }

    .progress span {
      display: block;
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0f6df2, #18aa49);
      transition: width .3s ease;
    }

    .badge {
      width: 70px;
      height: 76px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 28px;
      font-weight: 950;
      background: linear-gradient(180deg, #3a93ff, #0e52d8);
      border: 6px solid #cfe3ff;
      border-radius: 24px 24px 32px 32px;
      box-shadow: 0 12px 24px rgba(18,104,243,.24);
    }

    .lesson-rail {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: start;
      margin: 8px 0 30px;
    }

    .lesson-step {
      position: relative;
      text-align: center;
      border: 0;
      background: transparent;
      cursor: pointer;
      color: #60708a;
      padding: 0 4px;
      font: inherit;
      min-width: 0;
    }

    .lesson-step::before {
      content: "";
      position: absolute;
      top: 31px;
      left: 0;
      right: 0;
      border-top: 3px dashed #b9c9e2;
      z-index: 0;
    }

    .lesson-step:first-child::before { left: 50%; }
    .lesson-step:last-child::before { right: 50%; }

    .lesson-num {
      width: 66px;
      height: 66px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 6px solid #edf3fb;
      background: #fff;
      color: #29364f;
      font-size: 28px;
      font-weight: 950;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 18px rgba(13,45,90,.06);
      transition: .2s ease;
    }

    .lesson-title {
      display: block;
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lesson-step.active { color: var(--blue); }
    .lesson-step.active .lesson-num {
      color: #fff;
      background: linear-gradient(180deg, #1a86ff, #075be7);
      border-color: #cfe1ff;
      transform: translateY(-5px) scale(1.12);
      box-shadow: 0 14px 26px rgba(18,104,243,.32);
    }

    .mobile-bar {
      display: none;
      margin-bottom: 18px;
    }

    .mobile-bar select {
      width: 100%;
      border: 2px solid #cfe0f8;
      border-radius: 18px;
      padding: 14px 16px;
      background: #fff;
      color: #17213c;
      font-size: 18px;
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
      gap: 24px;
      align-items: stretch;
    }

    .panel {
      background: var(--panel);
      border: 2px solid #cfe0f8;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .main-card {
      min-height: 690px;
      padding: 34px 34px 28px;
      overflow: hidden;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .title-row h2 {
      font-size: clamp(30px, 3vw, 48px);
      margin: 0;
      font-weight: 950;
    }

    .task {
      color: var(--blue-dark);
      font-size: 24px;
      font-weight: 950;
      border-left: 2px solid #cfd9e8;
      padding-left: 24px;
    }

    .reset {
      border: 2px solid #d9e5f6;
      background: #fff;
      color: #33425e;
      border-radius: 18px;
      padding: 14px 28px;
      font-size: 21px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(13,45,90,.06);
    }

    .content-tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 14px 0 22px;
    }

    .tab {
      border: 1px solid #d7e4f7;
      background: #fff;
      color: #50617b;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 950;
      cursor: pointer;
    }

    .tab.active {
      background: #0f6df2;
      border-color: #0f6df2;
      color: #fff;
      box-shadow: 0 10px 22px rgba(18,104,243,.22);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .activity-pack,
    .mistake-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 18px;
    }

    .activity-card,
    .mistake {
      border: 2px solid #d9e7f8;
      border-radius: 22px;
      background: rgba(255,255,255,.92);
      padding: 18px;
      color: #2c3e5c;
      font-weight: 850;
      line-height: 1.65;
    }

    .activity-card h3,
    .mistake h3 {
      margin: 0 0 10px;
      color: #071637;
      font-size: 22px;
    }

    .activity-card strong,
    .mistake strong { color: var(--blue); }

    .activity-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .activity-tags span {
      border-radius: 999px;
      background: #eef6ff;
      color: #0f61df;
      padding: 8px 12px;
      font-weight: 950;
    }

    .interaction-stage {
      min-height: 430px;
      border: 2px solid #d8e6f8;
      border-radius: 26px;
      background:
        radial-gradient(circle at 85% 82%, rgba(24,170,73,.12), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.97), rgba(246,250,255,.94));
      padding: 24px;
      display: grid;
      gap: 18px;
      overflow: hidden;
    }

    .experiment-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 24px;
      font-weight: 950;
      color: #071637;
    }

    .experiment-title span {
      color: var(--blue);
      font-size: 18px;
    }

    .lab-feedback {
      border-radius: 20px;
      background: #f0f7ff;
      border: 2px dashed #bdd2ee;
      color: #344765;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.6;
    }

    .choice-grid,
    .quadrant-grid,
    .challenge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .choice-card,
    .quadrant-card,
    .challenge-card {
      border: 2px solid #dbe8f8;
      border-radius: 22px;
      background: #fff;
      padding: 18px;
      color: #263955;
      font-weight: 900;
      line-height: 1.55;
      box-shadow: 0 12px 26px rgba(13,45,90,.06);
    }

    .choice-card h3,
    .quadrant-card h3,
    .challenge-card h3 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #081433;
    }

    .choice-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button.choice,
    .choice-row button,
    .plot-btn {
      border: 2px solid #d8e5f7;
      border-radius: 999px;
      background: #f7fbff;
      color: #0d55d9;
      padding: 10px 14px;
      font-size: 17px;
      font-weight: 950;
      cursor: pointer;
    }

    button.correct {
      border-color: rgba(24,170,73,.5) !important;
      background: #eaf9ef !important;
      color: #0d8135 !important;
    }

    button.wrong {
      border-color: rgba(225,72,72,.38) !important;
      background: #fff0f0 !important;
      color: #be2f2f !important;
    }

    .coord-board {
      border: 2px solid #dbe8f8;
      border-radius: 24px;
      background: #fff;
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .plane {
      position: relative;
      width: min(620px, 100%);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 20px;
      background-image:
        linear-gradient(#e3edf9 1px, transparent 1px),
        linear-gradient(90deg, #e3edf9 1px, transparent 1px);
      background-size: calc(100% / 10) calc(100% / 10);
      background-color: #fbfdff;
      border: 2px solid #dce8f8;
      overflow: hidden;
    }

    .axis-x,
    .axis-y {
      position: absolute;
      background: #14213d;
      border-radius: 999px;
    }

    .axis-x {
      left: 4%;
      right: 4%;
      top: 50%;
      height: 5px;
    }

    .axis-y {
      top: 4%;
      bottom: 4%;
      left: 50%;
      width: 5px;
    }

    .axis-x::after,
    .axis-y::after {
      content: "";
      position: absolute;
      border: 12px solid transparent;
    }

    .axis-x::after {
      right: -3px;
      top: -10px;
      border-left-color: #14213d;
    }

    .axis-y::after {
      top: -3px;
      left: -10px;
      border-bottom-color: #14213d;
    }

    .axis-label {
      position: absolute;
      color: #0f61df;
      font-weight: 950;
      font-size: 20px;
    }

    .label-x { right: 6%; top: 53%; }
    .label-y { left: 53%; top: 5%; }
    .label-o { left: 52%; top: 52%; color: #263650; }

    .quad {
      position: absolute;
      color: rgba(18,104,243,.25);
      font-size: 42px;
      font-weight: 950;
    }

    .q1 { right: 18%; top: 18%; }
    .q2 { left: 18%; top: 18%; }
    .q3 { left: 18%; bottom: 18%; }
    .q4 { right: 18%; bottom: 18%; }

    .point {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: var(--blue);
      border: 5px solid #e9f3ff;
      box-shadow: 0 0 0 4px rgba(18,104,243,.18), 0 10px 24px rgba(18,104,243,.3);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 13px;
      font-weight: 950;
      cursor: pointer;
    }

    .point.green { background: var(--green); }
    .point.orange { background: var(--orange); }

    .readout {
      border-radius: 20px;
      background: #f5f9ff;
      border: 2px solid #dbe8f8;
      padding: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: 950;
      color: #17213c;
    }

    .plot-options {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .video-card {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 22px;
    }

    .video-screen,
    .video-notes {
      border: 2px solid #d6e5fb;
      border-radius: 24px;
      background: #fff;
      padding: 24px;
    }

    .video-screen {
      min-height: 370px;
      background:
        linear-gradient(135deg, rgba(18,104,243,.08), transparent 42%),
        linear-gradient(180deg, #fff, #edf6ff);
      display: grid;
      align-content: space-between;
      gap: 18px;
    }

    .video-kicker {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      background: #eaf3ff;
      color: #0f61df;
      padding: 8px 12px;
      font-size: 15px;
      font-weight: 950;
    }

    .video-screen h3 {
      margin: 14px 0 8px;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.16;
      font-weight: 950;
    }

    .video-screen p {
      margin: 0;
      color: #4f607a;
      font-size: 19px;
      line-height: 1.7;
      font-weight: 850;
    }

    .video-board,
    .note-list {
      display: grid;
      gap: 12px;
    }

    .video-board { grid-template-columns: repeat(3, 1fr); }

    .video-board div,
    .note-list div {
      border-radius: 16px;
      background: #f4f9ff;
      padding: 14px;
      color: #243653;
      font-weight: 900;
      line-height: 1.55;
    }

    .video-board strong {
      display: block;
      color: #0f6df2;
      font-size: 20px;
      margin-bottom: 6px;
    }

    .video-resource {
      border-radius: 18px;
      background: #eef6ff;
      border: 2px solid #cfe0f8;
      color: #30425f;
      padding: 14px 16px;
      font-weight: 900;
      line-height: 1.65;
    }

    .video-resource a {
      display: inline-flex;
      width: fit-content;
      margin-top: 10px;
      border-radius: 999px;
      background: #0f6df2;
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      font-weight: 950;
      box-shadow: 0 12px 24px rgba(18,104,243,.2);
    }

    .video-script {
      margin-top: 16px;
      border-radius: 18px;
      background: #f5f9ff;
      padding: 16px;
      color: #40526f;
      font-weight: 850;
      line-height: 1.75;
    }

    .video-script strong { color: #0f6df2; }

    .quiz {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 20px;
      align-items: start;
    }

    .question-list {
      display: grid;
      gap: 16px;
    }

    .question {
      border-radius: 24px;
      background: #fff;
      border: 2px solid #d9e7f8;
      padding: 20px;
    }

    .question h3 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 12px;
    }

    .question h3 span {
      display: inline-flex;
      min-width: 72px;
      justify-content: center;
      border-radius: 999px;
      background: #eaf3ff;
      color: #0f6df2;
      padding: 6px 10px;
      font-size: 15px;
      font-weight: 950;
    }

    .question p {
      margin: 0 0 18px;
      color: #293a57;
      font-size: 19px;
      font-weight: 900;
      line-height: 1.55;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      border: 2px solid #dbe7f8;
      border-radius: 16px;
      background: #f8fbff;
      color: #293a57;
      padding: 12px 14px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      text-align: left;
    }

    .feedback {
      border-radius: 24px;
      background: #eef6ff;
      border: 2px dashed #bdd2ee;
      padding: 22px;
      min-height: 260px;
      color: #485a75;
      font-size: 18px;
      line-height: 1.7;
      font-weight: 850;
    }

    .side-card {
      padding: 30px 24px 20px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 690px;
    }

    .assistant-head {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
    }

    .bot {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 42%, #0ff 0 6%, transparent 7%),
        radial-gradient(circle at 63% 42%, #0ff 0 6%, transparent 7%),
        linear-gradient(180deg, #f4fbff, #bad8ff);
      border: 6px solid #dbeaff;
      position: relative;
      box-shadow: 0 12px 24px rgba(18,104,243,.18);
    }

    .bot::before {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: 23px;
      height: 27px;
      border-radius: 14px;
      background: #0a1f49;
    }

    .bot::after {
      content: "";
      position: absolute;
      left: 28px;
      top: -10px;
      width: 8px;
      height: 14px;
      border-radius: 8px;
      background: #0f6df2;
    }

    .assistant-head h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #54647d;
      font-weight: 850;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #16bc54;
    }

    .quick {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin: 18px 0;
    }

    .quick button {
      border: 1px solid #d8e5f6;
      background: #f6faff;
      border-radius: 999px;
      padding: 9px 12px;
      color: #40526f;
      font-weight: 900;
      cursor: pointer;
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: auto;
      padding-right: 4px;
    }

    .bubble {
      border-radius: 20px;
      padding: 16px 18px;
      color: #20314f;
      font-size: 18px;
      line-height: 1.6;
      font-weight: 850;
      max-width: 92%;
    }

    .bubble.user {
      align-self: flex-end;
      background: #dcecff;
      border-top-right-radius: 8px;
    }

    .bubble.ai {
      align-self: flex-start;
      background: #fff;
      border: 2px solid #dce8f8;
      border-top-left-radius: 8px;
    }

    .ask {
      display: grid;
      grid-template-columns: 1fr 54px;
      gap: 10px;
      border-top: 1px solid #dce8f7;
      padding-top: 16px;
    }

    .ask input {
      width: 100%;
      border: 2px solid #dbe7f8;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 17px;
      outline: 0;
      color: #263650;
      font-weight: 850;
    }

    .ask button {
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, #1c86ff, #075ee8);
      color: #fff;
      font-size: 24px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 22px rgba(18,104,243,.24);
    }

    @media (max-width: 1120px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .progress-wrap {
        width: 100%;
        min-width: 0;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      .app {
        width: min(100vw - 24px, 680px);
        padding-top: 20px;
      }

      .lesson-rail { display: none; }
      .mobile-bar { display: block; }
      .brand { gap: 16px; }
      .lab-icon, .badge { transform: scale(.82); transform-origin: left center; }
      .progress-wrap { grid-template-columns: auto 1fr auto; }
      .progress-wrap .badge { display: none; }

      .main-card,
      .side-card {
        padding: 22px 16px;
        border-radius: 22px;
      }

      .task {
        border-left: 0;
        padding-left: 0;
        font-size: 18px;
      }

  <script>
    const lessons = [

      videoSummary.textContent = `本节用“观察坐标系、动手定位、回到图形”三步理解：${lesson.video[0]}`;
      videoBoard.innerHTML = lesson.video.map((item, i) => `<div><strong>${["概念", "方法", "提醒"][i]}</strong>${item}</div>`).join("");
      videoResource.innerHTML = `<strong>公开视频资源：</strong>${resource.provider} · ${resource.title}<br>${resource.note}<br><a href="${resource.url}" target="_blank" rel="noopener">打开官方学习视频</a>`;
      videoTitle.textContent = `微课笔记：${lesson.title}`;
      videoNotes.innerHTML = lesson.video.map(item => `<div>${item}</div>`).join("");
      videoScript.innerHTML = `<strong>讲解脚本：</strong>先让学生在坐标系中指出位置，再追问“为什么先横后纵”，最后总结本课最容易出错的地方：${lesson.mistakes[0]}`;

      quizFeedback.textContent = "一共有 3 道题。点击答案后，我会即时判断并讲清错因。";
      const quizzes = [lesson.quiz, ...extraQuizzes[current]];
      quizList.innerHTML = quizzes.map((quiz, qIndex) => `
        <div class="question" data-question="${qIndex}">
          <h3>第 ${qIndex + 1} 题 <span>${qIndex === 0 ? "基础" : qIndex === 1 ? "理解" : "应用"}</span></h3>
          <p>${quiz.q}</p>
          <div class="options">
            ${quiz.options.map((option, i) => `<button class="option" data-question="${qIndex}" data-answer="${i}" type="button">${option}</button>`).join("")}
          </div>
        </div>
      `).join("");

      mistakeGrid.innerHTML = lesson.mistakes.map((m, i) => `
        <article class="mistake">
          <h3>错因 ${i + 1}</h3>
          <p>${m}</p>
          <p><strong>改正策略：</strong>${i === 0 ? "先说清楚横纵含义，再动笔。" : i === 1 ? "从原点出发，按方向数单位。" : "画完点后回到坐标或图形验算。"}</p>
        </article>
      `).join("");
      quick.innerHTML = ["为什么先横后纵？", "帮我判断象限", "平移怎么变坐标？"].map(q => `<button type="button">${q}</button>`).join("");
    }

    function setFeedback(message) {
      const box = document.querySelector("#interactionFeedback");
      if (box) box.innerHTML = message;
    }

    interactionStage.addEventListener("click", event => {
      const btn = event.target.closest("button");
      if (!btn) return;
      if (btn.dataset.part) setFeedback(`你点到了${btn.dataset.part}：${btn.dataset.why}`);
      if (btn.dataset.read) {
        document.querySelector("#coordReadout").textContent = btn.dataset.read;
        setFeedback(btn.dataset.why);
      }
      if (btn.dataset.plot) {
        const [x, y] = btn.dataset.plot.split(",").map(Number);
        const point = document.querySelector("#plotPoint");
        point.setAttribute("style", pointStyle(x, y));
        const ok = x === 2 && y === 3;
        btn.classList.add(ok ? "correct" : "wrong");
        setFeedback(ok ? "描点正确：P(2,3) 是先右 2，再上 3。" : "这个位置不对。注意有序数对第一位是横坐标，第二位是纵坐标。");
      }
      if (btn.dataset.quad) {
        const ok = btn.dataset.quad === btn.dataset.right;
        btn.closest(".quadrant-card").querySelectorAll("button").forEach(item => item.classList.remove("correct", "wrong"));
        btn.classList.add(ok ? "correct" : "wrong");
        setFeedback(ok ? `判断正确：${btn.dataset.why}` : `再看 x、y 的正负。正确答案是${btn.dataset.right}，因为${btn.dataset.why}`);
      }
      if (btn.dataset.axisplace) {
        const ok = btn.dataset.axisplace === btn.dataset.right;
        btn.closest(".choice-card").querySelectorAll("button").forEach(item => item.classList.remove("correct", "wrong"));
        btn.classList.add(ok ? "correct" : "wrong");
        setFeedback(ok ? `分类正确：${btn.dataset.why}` : `这里容易误判。正确位置是${btn.dataset.right}，因为${btn.dataset.why}`);
      }
      if (btn.dataset.challenge) {
        const ok = btn.dataset.challenge === btn.dataset.right;
        btn.classList.add(ok ? "correct" : "wrong");
        setFeedback(ok ? `闯关正确：${btn.dataset.why}` : `再检查方向和坐标变化。正确答案是 ${btn.dataset.right}，因为${btn.dataset.why}`);
      }
    });

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(item => item.classList.remove("active"));
        panels.forEach(panel => panel.classList.remove("active"));
        tab.classList.add("active");
        document.querySelector(`#${tab.dataset.tab}`).classList.add("active");
      });
    });

    rail.addEventListener("click", event => {
      const btn = event.target.closest(".lesson-step");
      if (btn) renderLesson(btn.dataset.index);
    });
    select.addEventListener("change", event => renderLesson(event.target.value));
    document.querySelector("#resetBtn").addEventListener("click", () => renderLesson(current));

    quizList.addEventListener("click", event => {
      const option = event.target.closest(".option");
      if (!option) return;
      const questionIndex = Number(option.dataset.question);
      const quiz = [lessons[current].quiz, ...extraQuizzes[current]][questionIndex];
      const answer = quiz.answer;
      const questionCard = option.closest(".question");
      questionCard.querySelectorAll(".option").forEach(btn => {
        btn.classList.remove("correct", "wrong");
        if (Number(btn.dataset.answer) === answer) btn.classList.add("correct");
      });
      if (Number(option.dataset.answer) !== answer) option.classList.add("wrong");
      quizFeedback.innerHTML = `<strong>第 ${questionIndex + 1} 题：${Number(option.dataset.answer) === answer ? "答对了。" : "这里容易出错。"}</strong><br>${quiz.why}`;
    });

    function replyFor(text) {
      const lesson = lessons[current];
      if (/先横|先写|顺序|x.*y/.test(text)) return "坐标按 (x, y) 写，意思是先确定横向位置，再确定纵向位置。顺序换了，点通常就换位置。";
      if (/象限|第几/.test(text)) return "判断象限先看 x 的正负决定左右，再看 y 的正负决定上下：右上是一象限，左上是二象限，左下是三象限，右下是四象限。";
      if (/平移|移动/.test(text)) return "左右平移改变横坐标 x，上下平移改变纵坐标 y。向右、向上是加，向左、向下是减。";
      return `本课“${lesson.title}”先抓住这句：${lesson.video[0]} 你可以切到小测试，我会根据答案解释错因。`;
    }

    function addBubble(text, who) {
      const div = document.createElement("div");
      div.className = `bubble ${who}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    const askForm = document.querySelector("#askForm");
    const askInput = document.querySelector("#askInput");
    function submitQuestion(event) {
      event.preventDefault();
      const text = askInput.value.trim();
      if (!text) return;
      addBubble(text, "user");
      askInput.value = "";
      setTimeout(() => addBubble(replyFor(text), "ai"), 240);
    }
    askForm.addEventListener("submit", submitQuestion);
    askInput.addEventListener("keydown", event => {
      if (event.key === "Enter") submitQuestion(event);
    });
    quick.addEventListener("click", event => {
      const btn = event.target.closest("button");
      if (!btn) return;
      addBubble(btn.textContent, "user");
      setTimeout(() => addBubble(replyFor(btn.textContent), "ai"), 220);
    });

    initNav();
    renderLesson(current);
  </script>
</body>
</html>
