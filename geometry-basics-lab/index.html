<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>图形初步探索实验室</title>
  <style>
    :root {
      --blue: #1268f3;
      --green: #18aa49;
      --orange: #ff9f1a;
      --ink: #071431;
      --muted: #60708a;
      --line: #d8e6f8;
      --panel: rgba(255,255,255,.9);
      --shadow: 0 22px 60px rgba(13,78,180,.12);
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 8% 12%, rgba(18,104,243,.14), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(24,170,73,.12), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #edf6ff 100%);
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(18,104,243,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18,104,243,.05) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
    }
    .app {
      width: min(1540px, calc(100vw - 44px));
      margin: 0 auto;
      padding: 30px 0 38px;
      position: relative;
      z-index: 1;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 26px;
      margin-bottom: 26px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 22px;
    }
    .lab-icon {
      width: 74px;
      height: 74px;
      border: 5px solid var(--blue);
      border-radius: 24px;
      background:
        conic-gradient(from 45deg, rgba(18,104,243,.18), rgba(24,170,73,.18), rgba(255,159,26,.2), rgba(18,104,243,.18)),
        #fff;
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.75), 0 14px 28px rgba(18,104,243,.18);
      position: relative;
    }
    .lab-icon::before {
      content: "";
      position: absolute;
      left: 17px;
      top: 17px;
      width: 34px;
      height: 34px;
      border: 5px solid var(--blue);
      border-top-color: var(--green);
      transform: rotate(45deg);
      border-radius: 8px;
    }
    h1 {
      font-size: clamp(36px, 4.6vw, 66px);
      line-height: 1;
      margin: 0;
      font-weight: 950;
      letter-spacing: .03em;
    }
    .progress-wrap {
      min-width: 370px;
      flex: 0 1 540px;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 16px;
      color: #31415e;
      font-size: 20px;
      font-weight: 900;
    }
    .progress {
      height: 20px;
      border-radius: 999px;
      background: #dfe7f5;
      overflow: hidden;
    }
    .progress span {
      display: block;
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0f6df2, #18aa49);
      transition: width .3s ease;
    }
    .badge {
      width: 70px;
      height: 76px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 28px;
      font-weight: 950;
      background: linear-gradient(180deg, #3a93ff, #0e52d8);
      border: 6px solid #cfe3ff;
      border-radius: 24px 24px 32px 32px;
    }
    .lesson-rail {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: start;
      margin: 8px 0 30px;
    }
    .lesson-step {
      position: relative;
      text-align: center;
      border: 0;
      background: transparent;
      cursor: pointer;
      color: #60708a;
      padding: 0 4px;
      font: inherit;
      min-width: 0;
    }
    .lesson-step::before {
      content: "";
      position: absolute;
      top: 31px;
      left: 0;
      right: 0;
      border-top: 3px dashed #b9c9e2;
      z-index: 0;
    }
    .lesson-step:first-child::before { left: 50%; }
    .lesson-step:last-child::before { right: 50%; }
    .lesson-num {
      width: 66px;
      height: 66px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 6px solid #edf3fb;
      background: #fff;
      color: #29364f;
      font-size: 28px;
      font-weight: 950;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 18px rgba(13,45,90,.06);
      transition: .2s ease;
    }
    .lesson-title {
      display: block;
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lesson-step.active { color: var(--blue); }
    .lesson-step.active .lesson-num {
      color: #fff;
      background: linear-gradient(180deg, #1a86ff, #075be7);
      border-color: #cfe1ff;
      transform: translateY(-5px) scale(1.12);
    }
    .mobile-bar {
      display: none;
      margin-bottom: 18px;
    }
    .mobile-bar select {
      width: 100%;
      border: 2px solid #cfe0f8;
      border-radius: 18px;
      padding: 14px 16px;
      background: #fff;
      color: #17213c;
      font-size: 18px;
      font-weight: 900;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
      gap: 24px;
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 2px solid #cfe0f8;
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .main-card {
      min-height: 690px;
      padding: 34px 34px 28px;
      overflow: hidden;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .title-row h2 {
      font-size: clamp(30px, 3vw, 48px);
      margin: 0;
      font-weight: 950;
    }
    .task {
      color: #0a4ed6;
      font-size: 24px;
      font-weight: 950;
      border-left: 2px solid #cfd9e8;
      padding-left: 24px;
    }
    .reset {
      border: 2px solid #d9e5f6;
      background: #fff;
      color: #33425e;
      border-radius: 18px;
      padding: 14px 28px;
      font-size: 21px;
      font-weight: 950;
      cursor: pointer;
    }
    .content-tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 14px 0 22px;
    }
    .tab {
      border: 1px solid #d7e4f7;
      background: #fff;
      color: #50617b;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 950;
      cursor: pointer;
    }
    .tab.active {
      background: #0f6df2;
      border-color: #0f6df2;
      color: #fff;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .activity-pack,
    .mistake-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 18px;
    }
    .activity-card,
    .mistake {
      border: 2px solid #d9e7f8;
      border-radius: 22px;
      background: rgba(255,255,255,.92);
      padding: 18px;
      color: #2c3e5c;
      font-weight: 850;
      line-height: 1.65;
    }
    .activity-card h3,
    .mistake h3 {
      margin: 0 0 10px;
      color: #071637;
      font-size: 22px;
    }
    .activity-card strong,
    .mistake strong { color: var(--blue); }
    .activity-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .activity-tags span {
      border-radius: 999px;
      background: #eef6ff;
      color: #0f61df;
      padding: 8px 12px;
      font-weight: 950;
    }
    .interaction-stage {
      min-height: 430px;
      border: 2px solid #d8e6f8;
      border-radius: 26px;
      background:
        radial-gradient(circle at 85% 82%, rgba(24,170,73,.12), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.97), rgba(246,250,255,.94));
      padding: 24px;
      display: grid;
      gap: 18px;
      overflow: hidden;
    }
    .experiment-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 24px;
      font-weight: 950;
      color: #071637;
    }
    .experiment-title span {
      color: var(--blue);
      font-size: 18px;
    }
    .lab-feedback {
      border-radius: 20px;
      background: #f0f7ff;
      border: 2px dashed #bdd2ee;
      color: #344765;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.6;
    }
    .card-grid,
    .challenge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .geo-card,
    .challenge-card {
      border: 2px solid #dbe8f8;
      border-radius: 22px;
      background: #fff;
      padding: 18px;
      color: #263955;
      font-weight: 900;
      line-height: 1.55;
      box-shadow: 0 12px 26px rgba(13,45,90,.06);
    }
    .geo-card h3,
    .challenge-card h3 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #081433;
    }
    .choice-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button.choice,
    .choice-row button {
      border: 2px solid #d8e5f7;
      border-radius: 999px;
      background: #f7fbff;
      color: #0d55d9;
      padding: 10px 14px;
      font-size: 17px;
      font-weight: 950;
      cursor: pointer;
    }
    button.correct {
      border-color: rgba(24,170,73,.5) !important;
      background: #eaf9ef !important;
      color: #0d8135 !important;
    }
    button.wrong {
      border-color: rgba(225,72,72,.38) !important;
      background: #fff0f0 !important;
      color: #be2f2f !important;
    }
    .canvas {
      border: 2px solid #dbe8f8;
      border-radius: 24px;
      background: #fff;
      padding: 24px;
      min-height: 270px;
      position: relative;
      overflow: hidden;
    }
    .line-demo,
    .ray-demo,
    .segment-demo {
      position: relative;
      height: 76px;
      margin: 10px 0;
    }
    .line-demo::before,
    .ray-demo::before,
    .segment-demo::before {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: 36px;
      height: 6px;
      border-radius: 999px;
      background: #17213c;
    }
    .line-demo::after {
      content: "↔";
      position: absolute;
      left: 5%;
      right: 5%;
      top: 7px;
      font-size: 44px;
      color: var(--blue);
      letter-spacing: 7.6em;
    }
    .ray-demo::after {
      content: "→";
      position: absolute;
      right: 5%;
      top: 7px;
      font-size: 44px;
      color: var(--green);
    }
    .segment-demo span,
    .angle-arm span {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--blue);
      top: 30px;
    }
    .segment-demo .a { left: 10%; }
    .segment-demo .b { right: 10%; }
    .angle-box {
      height: 270px;
      position: relative;
    }
    .angle-arm {
      position: absolute;
      left: 46%;
      top: 68%;
      width: 220px;
      height: 6px;
      background: #17213c;
      transform-origin: left center;
      border-radius: 999px;
    }
    .arm1 { transform: rotate(0deg); }
    .arm2 { transform: rotate(-55deg); }
    .vertex {
      position: absolute;
      left: 46%;
      top: 68%;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--orange);
      transform: translate(-50%, -50%);
      border: 5px solid #fff2d9;
    }
    .shape {
      height: 120px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 24px;
      font-weight: 950;
      margin-bottom: 12px;
    }
    .cube { background: linear-gradient(135deg, #0f6df2, #75aaff); clip-path: polygon(18% 16%, 75% 16%, 92% 34%, 92% 78%, 34% 78%, 18% 60%); }
    .line-shape { background: linear-gradient(90deg, transparent 0 10%, #17213c 10% 90%, transparent 90%); color: #17213c; }
    .angle-shape { background: conic-gradient(from 230deg, #18aa49 0 70deg, transparent 70deg); color: #17213c; }
    .video-card {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 22px;
    }
    .video-screen,
    .video-notes {
      border: 2px solid #d6e5fb;
      border-radius: 24px;
      background: #fff;
      padding: 24px;
    }
    .video-screen {
      min-height: 370px;
      background:
        linear-gradient(135deg, rgba(18,104,243,.08), transparent 42%),
        linear-gradient(180deg, #fff, #edf6ff);
      display: grid;
      align-content: space-between;
      gap: 18px;
    }
    .video-kicker {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      background: #eaf3ff;
      color: #0f61df;
      padding: 8px 12px;
      font-size: 15px;
      font-weight: 950;
    }
    .video-screen h3 {
      margin: 14px 0 8px;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.16;
      font-weight: 950;
    }
    .video-screen p {
      margin: 0;
      color: #4f607a;
      font-size: 19px;
      line-height: 1.7;
      font-weight: 850;
    }
    .video-board,
    .note-list {
      display: grid;
      gap: 12px;
    }
    .video-board { grid-template-columns: repeat(3, 1fr); }
    .video-board div,
    .note-list div {
      border-radius: 16px;
      background: #f4f9ff;
      padding: 14px;
      color: #243653;
      font-weight: 900;
      line-height: 1.55;
    }
    .video-board strong {
      display: block;
      color: #0f6df2;
      font-size: 20px;
      margin-bottom: 6px;
    }
    .video-resource {
      border-radius: 18px;
      background: #eef6ff;
      border: 2px solid #cfe0f8;
      color: #30425f;
      padding: 14px 16px;
      font-weight: 900;
      line-height: 1.65;
    }
    .video-resource a {
      display: inline-flex;
      width: fit-content;
      margin-top: 10px;
      border-radius: 999px;
      background: #0f6df2;
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      font-weight: 950;
    }
    .video-script {
      margin-top: 16px;
      border-radius: 18px;
      background: #f5f9ff;
      padding: 16px;
      color: #40526f;
      font-weight: 850;
      line-height: 1.75;
    }
    .video-script strong { color: #0f6df2; }
    .quiz {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 20px;
      align-items: start;
    }
    .question-list {
      display: grid;
      gap: 16px;
    }
    .question {
      border-radius: 24px;
      background: #fff;
      border: 2px solid #d9e7f8;
      padding: 20px;
    }
    .question h3 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 12px;
    }
    .question h3 span {
      display: inline-flex;
      min-width: 72px;
      justify-content: center;
      border-radius: 999px;
      background: #eaf3ff;
      color: #0f6df2;
      padding: 6px 10px;
      font-size: 15px;
      font-weight: 950;
    }
    .question p {
      margin: 0 0 18px;
      color: #293a57;
      font-size: 19px;
      font-weight: 900;
      line-height: 1.55;
    }
    .options {
      display: grid;
      gap: 12px;
    }
    .option {
      border: 2px solid #dbe7f8;
      border-radius: 16px;
      background: #f8fbff;
      color: #293a57;
      padding: 12px 14px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      text-align: left;
    }
    .feedback {
      border-radius: 24px;
      background: #eef6ff;
      border: 2px dashed #bdd2ee;
      padding: 22px;
      min-height: 260px;
      color: #485a75;
      font-size: 18px;
      line-height: 1.7;
      font-weight: 850;
    }
    .side-card {
      padding: 30px 24px 20px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 690px;
    }
    .assistant-head {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
    }
    .bot {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 42%, #0ff 0 6%, transparent 7%),
        radial-gradient(circle at 63% 42%, #0ff 0 6%, transparent 7%),
        linear-gradient(180deg, #f4fbff, #bad8ff);
      border: 6px solid #dbeaff;
      position: relative;
    }
    .bot::before {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: 23px;
      height: 27px;
      border-radius: 14px;
      background: #0a1f49;
    }
    .bot::after {
      content: "";
      position: absolute;
      left: 28px;
      top: -10px;
      width: 8px;
      height: 14px;
      border-radius: 8px;
      background: #0f6df2;
    }
    .assistant-head h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #54647d;
      font-weight: 850;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #16bc54;
    }
    .quick {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin: 18px 0;
    }
    .quick button {
      border: 1px solid #d8e5f6;
      background: #f6faff;
      border-radius: 999px;
      padding: 9px 12px;
      color: #40526f;
      font-weight: 900;
      cursor: pointer;
    }
    .chat {
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: auto;
      padding-right: 4px;
    }
    .bubble {
      border-radius: 20px;
      padding: 16px 18px;
      color: #20314f;
      font-size: 18px;
      line-height: 1.6;
      font-weight: 850;
      max-width: 92%;
    }
    .bubble.user {
      align-self: flex-end;
      background: #dcecff;
      border-top-right-radius: 8px;
    }
    .bubble.ai {
      align-self: flex-start;
      background: #fff;
      border: 2px solid #dce8f8;
      border-top-left-radius: 8px;
    }
    .ask {
      display: grid;
      grid-template-columns: 1fr 54px;
      gap: 10px;
      border-top: 1px solid #dce8f7;
      padding-top: 16px;
    }
    .ask input {
      width: 100%;
      border: 2px solid #dbe7f8;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 17px;
      outline: 0;
      color: #263650;
      font-weight: 850;
    }
    .ask button {
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, #1c86ff, #075ee8);
      color: #fff;
      font-size: 24px;
      font-weight: 950;
      cursor: pointer;
    }
    @media (max-width: 1120px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .progress-wrap { width: 100%; min-width: 0; }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 820px) {
      .app { width: min(100vw - 24px, 680px); padding-top: 20px; }
      .lesson-rail { display: none; }
      .mobile-bar { display: block; }
      .brand { gap: 16px; }
      .lab-icon, .badge { transform: scale(.82); transform-origin: left center; }
      .progress-wrap { grid-template-columns: auto 1fr auto; }
      .progress-wrap .badge { display: none; }
      .main-card, .side-card { padding: 22px 16px; border-radius: 22px; }
      .task { border-left: 0; padding-left: 0; font-size: 18px; }
      .activity-pack,
      .mistake-grid,
      .card-grid,
      .challenge-grid,
      .video-card,
      .video-board,
      .quiz { grid-template-columns: 1fr; }
      .interaction-stage { padding: 16px; min-height: 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="lab-icon" aria-hidden="true"></div>
        <h1>图形初步探索实验室</h1>
      </div>
      <div class="progress-wrap">
        <span>学习进度</span>
        <div class="progress" aria-label="学习进度"><span id="progressFill"></span></div>
        <strong id="progressText">50%</strong>
        <div class="badge">★</div>
      </div>
    </header>

    <nav class="lesson-rail" id="lessonRail" aria-label="课时导航"></nav>
    <div class="mobile-bar">
      <select id="lessonSelect" aria-label="选择课时"></select>
    </div>

    <section class="grid">
      <article class="panel main-card">
        <div class="title-row">
          <div style="display:flex; align-items:center; gap:24px; flex-wrap:wrap;">
            <h2 id="lessonHeading">第4课时 角</h2>
            <div class="task" id="lessonTask">识别角的顶点、边和大小</div>
          </div>

        if (card) card.querySelectorAll("button").forEach(item => item.classList.remove("correct", "wrong"));
        btn.classList.add(ok ? "correct" : "wrong");
        setFeedback(ok ? `判断正确：${btn.dataset.why}` : `再回到定义。正确答案是${btn.dataset.right}，因为${btn.dataset.why}`);
      }
    });

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(item => item.classList.remove("active"));
        panels.forEach(panel => panel.classList.remove("active"));
        tab.classList.add("active");
        document.querySelector(`#${tab.dataset.tab}`).classList.add("active");
      });
    });
    rail.addEventListener("click", event => {
      const btn = event.target.closest(".lesson-step");
      if (btn) renderLesson(btn.dataset.index);
    });
    select.addEventListener("change", event => renderLesson(event.target.value));
    document.querySelector("#resetBtn").addEventListener("click", () => renderLesson(current));
    quizList.addEventListener("click", event => {
      const option = event.target.closest(".option");
      if (!option) return;
      const questionIndex = Number(option.dataset.question);
      const quiz = [lessons[current].quiz, ...extraQuizzes[current]][questionIndex];
      const answer = quiz.answer;
      const questionCard = option.closest(".question");
      questionCard.querySelectorAll(".option").forEach(btn => {
        btn.classList.remove("correct", "wrong");
        if (Number(btn.dataset.answer) === answer) btn.classList.add("correct");
      });
      if (Number(option.dataset.answer) !== answer) option.classList.add("wrong");
      quizFeedback.innerHTML = `<strong>第 ${questionIndex + 1} 题：${Number(option.dataset.answer) === answer ? "答对了。" : "这里容易出错。"}</strong><br>${quiz.why}`;
    });

    function replyFor(text) {
      const lesson = lessons[current];
      if (/直线|射线|线段/.test(text)) return "看端点和延伸方向：直线无端点，射线一个端点，线段两个端点且可测量长度。";
      if (/角|大小/.test(text)) return "角的大小看两边张开的程度，不看边画得长不长。";
      if (/定义|为什么/.test(text)) return `本课容易错在：${lesson.mistakes[0]}。先背定义，再用图验证。`;
      return `本课“${lesson.title}”先抓住这句：${lesson.video[0]} 你也可以切到小测试，我会根据答案分析错因。`;
    }

    function addBubble(text, who) {
      const div = document.createElement("div");
      div.className = `bubble ${who}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
    const askForm = document.querySelector("#askForm");
    const askInput = document.querySelector("#askInput");
    function submitQuestion(event) {
      event.preventDefault();
      const text = askInput.value.trim();
      if (!text) return;
      addBubble(text, "user");
      askInput.value = "";
      setTimeout(() => addBubble(replyFor(text), "ai"), 240);
    }
    askForm.addEventListener("submit", submitQuestion);
    askInput.addEventListener("keydown", event => {
      if (event.key === "Enter") submitQuestion(event);
    });
    quick.addEventListener("click", event => {
      const btn = event.target.closest("button");
      if (!btn) return;
      addBubble(btn.textContent, "user");
      setTimeout(() => addBubble(replyFor(btn.textContent), "ai"), 220);
    });

    initNav();
    renderLesson(current);
  </script>
</body>
</html>
